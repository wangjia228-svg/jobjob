<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Fact Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        #fact {
            font-size: 1.2rem;
            color: #333;
            margin: 30px 0;
            min-height: 60px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-3px);
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Random Fact Generator</h1>
        <p id="fact">Click the button to get a random fact!</p>
        <button onclick="generateFact()">Get Random Fact</button>
    </div>

    <script>
        const facts = [
            "Honey never spoils. Archaeologists have found 3000-year-old honey in Egyptian tombs that's still edible!",
            "Octopuses have three hearts and blue blood.",
            "Bananas are berries, but strawberries aren't.",
            "A day on Venus is longer than its year.",
            "The Eiffel Tower can be 15 cm taller during summer due to thermal expansion.",
            "Sharks existed before trees. They've been around for over 400 million years!",
            "The human brain uses about 20% of the body's energy despite being only 2% of body weight.",
            "Wombat poop is cube-shaped.",
            "The shortest war in history lasted 38-45 minutes (Anglo-Zanzibar War, 1896).",
            "There are more possible iterations of a game of chess than atoms in the observable universe."
        ];

        function generateFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            document.getElementById('fact').textContent = facts[randomIndex];
        }
    </script>
</body>
</html>
